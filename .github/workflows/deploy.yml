name: Build and deploy to FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Subir todos los archivos (borra estado sync en servidor)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web + API
        run: bash scripts/build_web.sh

      - name: Resumen del build
        run: |
          echo "Archivos generados:"
          find flutter_app/build/web -type f | wc -l
          ls -lh flutter_app/build/web/main.dart.js
          ls -lh flutter_app/build/web/flutter_service_worker.js 2>/dev/null || true

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: flutter_app/build/web/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Estado nuevo por ejecución → sube todos los archivos (evita SW/index desactualizados)
          state-name: .ftp-deploy-state-${{ github.run_id }}.json
          log-level: verbose
          security: loose
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && inputs.force_full_deploy == true }}
          exclude: |
            **/.git*
            **/.git/**
            **/api/config/constantes.php
            **/_notes/**
            **/.DS_Store
