<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Simple Factura — facturación sencilla">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent: el contenido (azul) se ve tras el notch -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Simple Factura">
  <meta name="theme-color" content="#2196F3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#2196F3" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#2196F3">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Simple Factura</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --sf-azul: #2196F3;
      --sf-safe-top: env(safe-area-inset-top, 0px);
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
      background-color: var(--sf-azul);
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      min-height: -webkit-fill-available;
      /* Azul: si Flutter deja hueco en el notch, se ve azul y no blanco */
      background-color: var(--sf-azul) !important;
      overscroll-behavior: none;
    }

    /*
      Franja fija sobre el notch. Flutter en web a veces no reporta safe-area
      (MediaQuery.top = 0) y pinta blanco; este div lo cubre con CSS nativo.
      z-index alto para quedar por encima del canvas opaco de Flutter.
    */
    #sf-notch {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--sf-safe-top);
      background-color: var(--sf-azul);
      z-index: 100000;
      pointer-events: none;
    }

    /* Fallback iPhone si env() falla en algún WebView */
    @supports (padding: max(0px)) {
      #sf-notch {
        height: max(var(--sf-safe-top), 0px);
      }
    }

    #sf-loading {
      position: fixed;
      inset: 0;
      z-index: 100001;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5F7FA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    #sf-loading.sf-oculto {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #sf-loading .sf-contenido {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }

    #sf-loading .sf-marca {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1C2733;
    }

    #sf-loading .sf-marca span {
      color: #2196F3;
    }

    #sf-loading .sf-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(33, 150, 243, 0.18);
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: sf-girar 0.75s linear infinite;
    }

    #sf-loading .sf-texto {
      margin: 0;
      font-size: 15px;
      font-weight: 500;
      color: rgba(28, 39, 51, 0.65);
    }

    @keyframes sf-girar {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Cubre el notch aunque Flutter pinte blanco debajo -->
  <div id="sf-notch" aria-hidden="true"></div>

  <div id="sf-loading" role="status" aria-live="polite" aria-label="Cargando aplicación">
    <div class="sf-contenido">
      <div class="sf-marca">Simple<span>Factura</span></div>
      <div class="sf-spinner" aria-hidden="true"></div>
      <p class="sf-texto">Cargando aplicación…</p>
    </div>
  </div>

  <script>
    (function () {
      function ocultarLoader() {
        var el = document.getElementById('sf-loading');
        if (!el || el.classList.contains('sf-oculto')) return;
        el.classList.add('sf-oculto');
        setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, 320);
      }

      window.addEventListener('flutter-first-frame', ocultarLoader);
      document.addEventListener('DOMContentLoaded', function () {
        if (window._flutter_web_initialized) ocultarLoader();
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
