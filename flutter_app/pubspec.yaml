name: simple_factura
description: Simple Factura - facturacion sencilla para Espana y Latinoamerica
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Gestion de estado
  provider: ^6.1.2

  # Peticiones HTTP a la API PHP
  http: ^1.2.1

  # Guardar el token de sesion en el dispositivo
  shared_preferences: ^2.2.3

  # Renderizar el logotipo SVG de la marca
  flutter_svg: ^2.0.10+1

  # Formato de moneda/fecha por pais (es, es_MX, es_CO, etc.)
  intl: ^0.19.0

  pdf: ^3.12.0
  excel: ^4.0.6

  # Dropdowns con busqueda y multiseleccion
  dropdown_flutter: ^1.1.0

  # Seleccion de logotipo (web, desktop, movil)
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logotipo_simple_factura.svg
    - assets/logo/logotipo_simple_factura_blanco.svg
    - assets/plantillas_factura/
